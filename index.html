<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pearl Global - Employee Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="collage-scroller">
        <img src="Untitled design (1).png" alt="Background Collage" decoding="async">
        <img src="Untitled design (1).png" alt="Background Collage" decoding="async">
        <img src="Untitled design (1).png" alt="Background Collage" decoding="async">
        <img src="Untitled design (1).png" alt="Background Collage" decoding="async">
    </div>

    <div class="collage-overlay"></div>

    <div class="bg-graphics">
        <div class="glow-edge glow-top"></div>
        <div class="glow-edge glow-bottom"></div>
    </div>

    <div class="main-layout">
        <div class="panels-container">
            
            <div class="left-panels">
                <div class="glass-box info-slider-box" id="info-slider">
                    <h3 id="info-title">Our Vision</h3>
                    <p id="info-desc">“To be the global leader providing end-to-end supply chain solutions to the fashion industry.”</p>
                </div>
            </div>

            <div class="glass-box form-box">
                
                <div class="form-logo-container">
                    <img src="Pearl_logo_Text.png" class="hd-logo" alt="Pearl Global Logo">
                </div>

                <form id="w0" class="login-form" action="https://pearlglobalcentral.com/user/login" method="post">
                    <input type="hidden" name="_csrf" value="2wuw_C-W7V-fJXHsQ1l5PO1AyptYGV1HmYSGNsEV6kOicvS_SbuXDdtcQtR7OxRKpimTw2pqGh_c3upjqziiNg==">
                    
                    <div class="input-group">
                        <label>Username</label>
                        <input type="text" name="LoginForm[email_id]" placeholder="Enter username" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" name="LoginForm[password]" placeholder="Enter password" required>
                    </div>

                    <div class="login-footer">
                        <button type="submit" class="submit-btn">SIGN IN</button>
                        <a href="https://pearlglobalcentral.com/user/forgot-password" class="forgot">Forgot Password?</a>
                    </div>
                </form>

                <nav class="bottom-nav">
                    <a href="mailto:hr@pearlglobal.com" class="nav-btn glass-btn">HR Helpdesk</a>
                    <a href="mailto:it@pearlglobal.com" class="nav-btn glass-btn">IT Helpdesk</a>
                </nav>
            </div>
            
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
